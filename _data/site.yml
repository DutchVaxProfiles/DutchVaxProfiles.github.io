title: "Dutch Vaccination Profiles"
subtitle: "Understanding heterogeneity in vaccination decisions"
collaboration: "Utrecht University and Amsterdam UMC"

hero:
  eyebrow: "Project overview"
  title: "Dutch Vaccination Profiles"
  lead: "Understanding variation in vaccination decisions across people and places in the Netherlands."
  paragraphs:
    - "Vaccination uptake is shaped by more than information alone. People differ in how they weigh disease risk, vaccine benefits, social expectations, autonomy, trust, and practical confidence. This project connects detailed vaccination decision profiles with broader mapped profile groups that can support local pandemic preparedness."
  provisional_note: "Please note: the results shown here are provisional and may change as the analyses and mapped estimates are updated."
  funder_note: "Funded by ZonMw through the Kennisprogramma Pandemische Paraatheid (grant 10710062310013)."

method:
  steps:
    - number: "1"
      title: "Identify 12 decision profiles"
      text: "LISS survey measures capture beliefs, values, norms, and intentions."
      href: "#survey-profiles"
    - number: "2"
      title: "Compare profile differences"
      text: "Profiles are compared on trust, decision style, knowledge, and demographics."
      href: "#survey-profiles"
    - number: "3"
      title: "Map 5 broader groups"
      text: "CBS-linked variables support a more aggregated wijk-level view."
      href: "#map"
    - number: "4"
      title: "Draw practical lessons"
      text: "The results guide communication, planning, and preparedness questions."
      href: "#lessons"
  actions:
    - label: "Explore the 12 vaccination profiles"
      href: "#survey-profiles"
    - label: "Compare their differences"
      href: "#profile-differences"
    - label: "View profile groups on the map"
      href: "#map"
    - label: "See main lessons"
      href: "#lessons"

map:
  eyebrow: "Study 2"
  title: "Mapping vaccination profile groups across Dutch wijken"
  intro: "The map shows five broad profile groups at wijk level. These groups combine the twelve vaccination decision profiles from Study 1 into three positive groups, one neutral group, and one negative group. The five-group solution is a modelling compromise: it preserves less psychological detail than the 12-profile survey solution, but it is a more reliable basis for mapping with registry data."
  note_summary: "How to read the current Study 2 map"
  note_text: "The current Study 2 map does not yet show the final CBS-linked model output. It is included so the team can test the interface, labels, colour scale, and practitioner-facing story before the final wijk estimates are added. Values are percentages at aggregate level; missing values are shown in grey."
  iframe_title: "Dutch vaccination profile group wijk map"
  iframe_url: "https://dutchvaxprofiles.github.io/map-explorer/"
  fallback_label: "Open the map in a separate tab"

funder:
  name: "ZonMw"
  grant_number: "10710062310013"
  programme: "Kennisprogramma Pandemische Paraatheid"
  call: "Modelleren voor Pandemische Paraatheid: een oproep tot innovatie en kennisontwikkeling"
  project_title: "Het modelleren van vaccinatie keuze profielen van burgers voor doelgerichtere interventies"
  award_date: "1 July 2024"
  amount: "EUR 359,837"
  duration: "15 months"
  text: "The project is funded by ZonMw through the Kennisprogramma Pandemische Paraatheid. It develops modelling tools to estimate the distribution of vaccination decision profiles at population and local levels, with the aim of informing more targeted vaccination interventions."

