section:
  eyebrow: "Lessons"
  title: "What this means for vaccination practice and research"

items:
  - title: "Diagnose why uptake differs"
    text: "The profiles help separate belief patterns that may look similar in uptake statistics. A low-intention group may need trust-building, autonomy-sensitive communication, or practical access support for different reasons."
  - title: "Match communication to decision patterns"
    text: "Positive, neutral, and negative profiles differ in vaccine beliefs, social values, moral obligation, and trust. That means a single information message is unlikely to fit all audiences equally well."
  - title: "Maps are preparation tools, not labels"
    text: "The wijk map is an aggregate planning tool. It can guide questions, partnerships, and resource allocation, but it should not be used to infer the profile or motives of individual residents."
