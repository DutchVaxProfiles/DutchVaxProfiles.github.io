section:
  eyebrow: "Lessons"
  title: "What this means for vaccination practice and research"

items:
  - title: "Diagnose why uptake differs"
    text: "The profiles help separate belief patterns that may look similar in uptake statistics. Lower intention can reflect different needs, such as trust-building, autonomy-sensitive communication, or practical access support."
  - title: "Match communication to decision patterns"
    text: "Positive, neutral, and negative profiles differ in vaccine beliefs, social values, moral obligation, and trust. A single information message is therefore unlikely to fit all audiences equally well."
  - title: "Maps are preparation tools, not labels"
    text: "The wijk map is an aggregate planning tool. It can guide questions, partnerships, and resource allocation, but it should not be used to infer the profile or motives of individual residents."
