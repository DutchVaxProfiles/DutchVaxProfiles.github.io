section:
  eyebrow: "Study 1"
  title: "The 12 vaccination decision profiles"
  intro: "The first paper uses Latent Profile Analysis in a representative Dutch LISS sample to identify 12 COVID-19 vaccination decision profiles. These are population patterns, not labels for individual people. The 12-profile solution preserves the psychological nuance that is needed to understand why people with similar intentions may still need different kinds of communication and support."

groups:
  - class_name: "positive-group"
    title: "Positive profiles 1-6"
    text: "These profiles generally support vaccination, but not all for the same reasons. Some combine positive vaccine beliefs with strong moral obligation and social norms; others are positive while still showing more mixed feelings about vaccination."
  - class_name: "neutral-group"
    title: "Neutral profiles 7-9"
    text: "These profiles sit closer to the middle on intention. They differ less by disease beliefs and more by vaccine beliefs, autonomy, freedom, and moral obligation."
  - class_name: "negative-group"
    title: "Negative profiles 10-12"
    text: "These smaller profiles have lower vaccination intention. They differ most in vaccine beliefs and individual values such as autonomy, freedom, naturalness, and purity concerns."

visual:
  title: "Profile size and July 2021 vaccination intention"
  text: "Each card has the same size. The fill colour tracks July 2021 vaccination intention from lower red to higher blue. The left edge marks the profile family, and the square label shows profile share with area proportional to the share."
  scale_label: "Lower intention (red) to higher intention (blue)"
  positive_edge_label: "Positive edge"
  neutral_edge_label: "Neutral edge"
  negative_edge_label: "Negative edge"
  share_marker_label: "Square area and label = profile share"

