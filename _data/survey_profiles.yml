details:
  first_summary: "Open the manuscript profile plots and exact Table 2 values"
  indicator_figure:
    image: "/assets/img/survey-profiles/profile-indicators.png"
    alt: "Line plots showing 12 vaccination decision profiles across COVID-19 beliefs, vaccine beliefs, social values, and individual values, grouped into positive, neutral, and negative profiles."
    caption: "Figure 1 from the current manuscript. Mean indicator values are shown as standardized scores. Profiles 1-6 are positive, profiles 7-9 are neutral, and profiles 10-12 are negative vaccination decision profiles."
  second_summary: "What else differentiates the 12 profiles?"
  differentiators:
    - image: "/assets/img/survey-profiles/trust.png"
      alt: "Plots of trust in government, science, healthcare, and others by vaccination decision profile."
      caption: "Trust is generally higher in positive profiles than in neutral and negative profiles."
    - image: "/assets/img/survey-profiles/decision-styles.png"
      alt: "Plots of dependent, avoidant, spontaneous, rational, and intuitive decision-making styles by profile."
      caption: "Negative and neutral profiles differ in avoidant and functional decision-making styles."
    - image: "/assets/img/survey-profiles/health-literacy-knowledge.png"
      alt: "Plots of critical health literacy, functional health literacy, and subjective knowledge by profile."
      caption: "Health literacy is not the whole story; subjective knowledge varies more clearly."
    - image: "/assets/img/survey-profiles/demographics.png"
      alt: "Plots of sex, educational attainment, ethnic background, and mean age by profile."
      caption: "Profiles also differ in demographic composition, which matters for interpretation and targeting."
