{% assign method = site.data.site.method %}

<section id="method" class="content-section method-overview">
  <div class="section-heading">
    <p class="eyebrow">{{ method.eyebrow }}</p>
    <h2>{{ method.title }}</h2>
    <p>{{ method.intro }}</p>
  </div>
  <div class="method-diagram" aria-label="Project method diagram">
    {% for step in method.steps %}
      <a class="method-node" href="{{ step.href }}">
        <span class="method-number">{{ step.number }}</span>
        <strong>{{ step.title }}</strong>
        <small>{{ step.text }}</small>
      </a>
    {% endfor %}
  </div>
</section>
