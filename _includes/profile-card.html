<article class="profile-card" style="--edge: {{ include.profile.edge }}; --intent-bg: {{ include.profile.intent_bg }}; --marker-size: {{ include.profile.marker_size }}px;">
  <div class="profile-card-top">
    <span>{{ include.profile.family }}</span>
  </div>
  <h3 class="profile-card-title">{{ include.profile.id }}</h3>
  <p class="profile-card-intention">{{ include.profile.intention }}</p>
  <p>{{ include.profile.note }}</p>
  <span class="profile-size-marker" aria-label="{{ include.profile.share }} profile share">{{ include.profile.share }}</span>
</article>
