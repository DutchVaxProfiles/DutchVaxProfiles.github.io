{% assign hero = site.data.site.hero %}

<section class="hero" id="overview">
  <p class="eyebrow">{{ hero.eyebrow }}</p>
  <h1>{{ hero.title }}</h1>
  <p class="lead">{{ hero.lead }}</p>
  {% for paragraph in hero.paragraphs %}
    <p>{{ paragraph }}</p>
  {% endfor %}
  <p class="funder-note">{{ hero.funder_note }}</p>
  <div class="hero-actions" aria-label="Primary page links">
    {% for action in hero.actions %}
      <a class="button {{ action.style }}" href="{{ action.href }}">{{ action.label }}</a>
    {% endfor %}
  </div>
</section>
