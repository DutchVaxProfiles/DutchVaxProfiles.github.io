{% assign hero = site.data.site.hero %}

<section class="hero" id="overview">
  <div class="hero-layout">
    <div class="hero-copy">
      <p class="eyebrow">{{ hero.eyebrow }}</p>
      <h1>{{ hero.title }}</h1>
      <p class="lead">{{ hero.lead }}</p>
      {% for paragraph in hero.paragraphs %}
        <p>{{ paragraph }}</p>
      {% endfor %}
      <p class="provisional-note" role="note">{{ hero.provisional_note }}</p>
    </div>
    <aside class="hero-support" aria-label="Project partners and funding">
      {% include partner-logos.html class_name="hero-logos" %}
      <p class="funder-note">{{ hero.funder_note }}</p>
    </aside>
  </div>
</section>
