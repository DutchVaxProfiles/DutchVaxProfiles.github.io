{% assign lessons = site.data.lessons %}

<section id="lessons" class="content-section">
  <div class="section-heading">
    <p class="eyebrow">{{ lessons.section.eyebrow }}</p>
    <h2>{{ lessons.section.title }}</h2>
  </div>
  <div class="insight-list">
    {% for item in lessons.items %}
      <article>
        <h3>{{ item.title }}</h3>
        <p>{{ item.text }}</p>
      </article>
    {% endfor %}
  </div>
</section>
